<style>
    :root {
        --primary-cyan: #00f0ff;
        --surface-dark: #0a0b10;
    }
    body {
        background-color: var(--surface-dark);
        font-family: 'Space Grotesk', sans-serif;
        margin: 0;
        cursor: crosshair;
        overflow: hidden;
        color: #e3e1e9;
    }
    /* Rejilla de fondo */
    .grid-bg {
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(rgba(0,240,255,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,240,255,0.04) 1px, transparent 1px);
        background-size: 44px 44px;
        z-index: 0;
    }
    /* Glow radial central */
    .glow-bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 50% 45%, rgba(0,240,255,0.06) 0%, transparent 55%);
        z-index: 0;
    }
    /* Glitch del 404 */
    .glitch-404 {
        position: relative;
        font-size: clamp(6rem, 22vw, 16rem);
        font-weight: 900;
        color: var(--primary-cyan);
        text-shadow: 0 0 30px rgba(0,240,255,0.6);
        line-height: 1;
        letter-spacing: 0.05em;
    }
    .glitch-404::before,
    .glitch-404::after {
        content: "404";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
    }
    .glitch-404::before {
        color: #ff3b6b;
        animation: glitch-x 2.5s infinite linear alternate;
        opacity: 0.6;
    }
    .glitch-404::after {
        color: #548dff;
        animation: glitch-x 3s infinite linear alternate-reverse;
        opacity: 0.5;
    }
    @keyframes glitch-x {
        0% { transform: translate(0); }
        20% { transform: translate(-3px, 1px); }
        40% { transform: translate(2px, -2px); }
        60% { transform: translate(-1px, 2px); }
        80% { transform: translate(3px, -1px); }
        100% { transform: translate(0); }
    }
    /* Línea de escaneo */
    .scan {
        position: fixed;
        left: 0;
        width: 100%;
        height: 80px;
        background: linear-gradient(to bottom, transparent, rgba(0,240,255,0.08), transparent);
        animation: scan-move 5s linear infinite;
        z-index: 1;
        pointer-events: none;
    }
    @keyframes scan-move {
        0% { top: -80px; }
        100% { top: 100%; }
    }
    .blink { animation: blink 1.2s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
        .glitch-404::before, .glitch-404::after { animation: none; }
        .scan { display: none; }
        .blink { animation: none; }
    }
</style>
</head>
<body>
