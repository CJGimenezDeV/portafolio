<svg width="100%" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Captura del primer Hola mundo en Chrome sobre Windows 11">
  <title>Hola mundo - el primer proyecto</title>
  <desc>Ventana del navegador Chrome en Windows 11 mostrando un archivo HTML local con el texto Hola mundo, sin estilos.</desc>

  <!-- Fondo ventana -->
  <rect x="0" y="0" width="1200" height="760" rx="10" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Barra de pestañas (Chrome / Win11) -->
  <rect x="0" y="0" width="1200" height="48" rx="10" fill="#dee1e6"/>
  <rect x="0" y="30" width="1200" height="18" fill="#dee1e6"/>

  <!-- Pestaña activa -->
  <path d="M 18 48 L 30 12 Q 33 6 41 6 L 250 6 Q 258 6 261 12 L 273 48 Z" fill="#ffffff"/>
  <text x="52" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#3c4043">index.html</text>
  <!-- icono documento en la pestaña -->
  <rect x="34" y="20" width="11" height="13" rx="1.5" fill="none" stroke="#5f6368" stroke-width="1.4"/>
  <!-- x cerrar pestaña -->
  <line x1="244" y1="22" x2="254" y2="32" stroke="#5f6368" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="254" y1="22" x2="244" y2="32" stroke="#5f6368" stroke-width="1.4" stroke-linecap="round"/>

  <!-- + nueva pestaña -->
  <line x1="292" y1="27" x2="308" y2="27" stroke="#5f6368" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="300" y1="19" x2="300" y2="35" stroke="#5f6368" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Botones ventana Win11 (min, max, cerrar) -->
  <line x1="1110" y1="24" x2="1126" y2="24" stroke="#3c4043" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="1146" y="17" width="14" height="14" rx="2" fill="none" stroke="#3c4043" stroke-width="1.4"/>
  <line x1="1180" y1="17" x2="1194" y2="31" stroke="#3c4043" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="1194" y1="17" x2="1180" y2="31" stroke="#3c4043" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Barra de herramientas / direcciones -->
  <rect x="0" y="48" width="1200" height="56" fill="#ffffff"/>
  <!-- Flechas atras/adelante y recargar -->
  <path d="M 38 76 L 26 76 M 26 76 L 32 70 M 26 76 L 32 82" fill="none" stroke="#9aa0a6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 66 76 L 78 76 M 78 76 L 72 70 M 78 76 L 72 82" fill="none" stroke="#5f6368" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 100 70 a 8 8 0 1 0 7 4" fill="none" stroke="#5f6368" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 108 66 L 108 75 L 99 75" fill="none" stroke="#5f6368" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Caja de direcciones (omnibox) -->
  <rect x="132" y="62" width="936" height="28" rx="14" fill="#f1f3f4"/>
  <!-- icono pagina local -->
  <rect x="150" y="69" width="11" height="14" rx="1.5" fill="none" stroke="#5f6368" stroke-width="1.3"/>
  <text x="174" y="81" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#3c4043">file:///C:/Users/alumno04/Desktop/index.html</text>

  <!-- icono estrella / perfil a la derecha -->
  <path d="M 1092 70 l 3 6 6 1 -4.5 4.5 1 6 -5.5 -3 -5.5 3 1 -6 -4.5 -4.5 6 -1 z" fill="none" stroke="#5f6368" stroke-width="1.3" stroke-linejoin="round"/>
  <circle cx="1150" cy="76" r="11" fill="#1a73e8"/>
  <text x="1150" y="81" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">CJ</text>

  <!-- Linea divisoria bajo toolbar -->
  <line x1="0" y1="104" x2="1200" y2="104" stroke="#e8eaed" stroke-width="1"/>

  <!-- AREA DE LA PAGINA: el Hola mundo crudo, sin CSS -->
  <rect x="0" y="105" width="1200" height="655" fill="#ffffff"/>
  <text x="32" y="148" font-family="Times New Roman, Times, serif" font-size="22" fill="#000000">Hola mundo</text>

</svg>
